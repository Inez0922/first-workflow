name: Parallel Job Example

on:
  push:
    branches: [ main ]

# 环境变量（对整个 Job 生效）
env:
  DEBUG: false

jobs:
  # 第一个并行任务：build-and-test-1
  build-and-test-1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # 条件执行：仅 main 分支运行
      - name: Print a message for main branch
        if: github.ref == 'refs/heads/main'
        run: echo "This is the main branch."

      # 条件执行：仅非 main 分支运行
      - name: Print a message for non-main branches
        if: github.ref != 'refs/heads/main'
        run: echo "This is not the main branch."

      # 运行 Python 单元测试
      - name: Run Python tests
        run: |
          python <<EOF
          import unittest
          class SimpleTest(unittest.TestCase):
              def test_addition(self):
                  self.assertEqual(1 + 1, 2)
              def test_truth(self):
                  self.assertTrue(True)
          if __name__ == "__main__":
              unittest.main()
          EOF

      # 条件执行：仅 DEBUG=true 时运行
      - name: Debug message
        if: env.DEBUG == 'true'
        run: echo "Debugging is enabled."

  # 第二个并行任务：build-and-test-2（和第一个同时跑）
  build-and-test-2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run Python tests
        run: |
          python <<EOF
          print("Running tests in build-and-test-2 job")
          assert 2 * 2 == 4
          EOF

  # 串行任务：post-build-actions（等前两个任务都成功再跑）
  post-build-actions:
    needs: [build-and-test-1, build-and-test-2]
    runs-on: ubuntu-latest
    steps:
      - name: Generate test report
        run: echo "Test report generated successfully!" >> report.txt
      - name: Upload report as artifact
        uses: actions/upload-artifact@v3
        with:
          name: test-report
          path: report.txt