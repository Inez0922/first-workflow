name: Python Build & Deploy Workflow

on:
  workflow_dispatch:  # 手动触发
  push:
    branches:
      - main  # 推送到 main 分支触发

jobs:
  # Job 1: 构建与测试（串行第一步）
  build_test:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：配置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"  # 始终使用最新 Python 3 版本

      # 步骤3：安装依赖、运行测试
      - name: Install dependencies and run tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found"
          python -m unittest discover || echo "No tests found"

  # Job 2: 部署到 staging 环境（串行第二步，依赖 build_test）
  deploy_staging:
    needs: build_test  # 等待 build_test 完成后执行
    runs-on: ubuntu-latest
    environment: staging  # 绑定 staging 环境
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment to staging
        run: echo "Deploying Python app to staging environment..."

  # Job 3: 部署到 production 环境（串行第三步，依赖 deploy_staging）
  deploy_production:
    needs: deploy_staging  # 等待 deploy_staging 完成后执行
    runs-on: ubuntu-latest
    environment: production  # 绑定 production 环境
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment to production
        run: echo "Deploying Python app to production environment..."