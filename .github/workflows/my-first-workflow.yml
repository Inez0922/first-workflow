# Name of the workflow (appears in GitHub Actions UI)
name: My First Workflow

# Events that trigger this workflow
on:
  push:
    # Trigger workflow on push events
    branches:
      # Only trigger when pushing to the 'main' branch
      - main

# Define jobs for the workflow
jobs:
  build:
    # The OS for the runner (GitHub-hosted Ubuntu machine)
    runs-on: ubuntu-latest

    # Steps to run inside the job
    steps:
      # Step 1: Check out your repository code
      - name: Check out repository
        # Uses the official GitHub action to clone your repo
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        # Official action to install Python
        uses: actions/setup-python@v4
        with:
          # Specify Python version 3.11
          python-version: '3.11'

      # Step 3: Run a Python command
      - name: Print a message
        run: python -c "print('Hello,world！')"